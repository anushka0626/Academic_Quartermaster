<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛡️ Academic Quartermaster</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0c0e14; /* DEEP DARK BACKGROUND */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #e0e6ed;
    }
    #app {
      width: 100%;
      max-width: 500px; /* CENTERING */
      height: 85vh;
      background: #1a1d26; /* APP CONTAINER COLOR */
      border: 1px solid #30364d;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }
    #header {
      padding: 18px 22px;
      border-bottom: 1px solid #30364d;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(26, 29, 38, 0.95);
    }
    #avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #3c3489;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #fff;
      font-weight: 600;
    }
    #header-text h2 { font-size: 16px; font-weight: 600; color: #fff; }
    #header-text p { font-size: 12px; color: #8e95a3; }
    #status-dot { width: 10px; height: 10px; border-radius: 50%; background: #28cd41; margin-left: auto; }
    
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .bubble { padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.6; color: #fff; }
    
    .msg.bot .bubble { 
      background: #252a3a; /* BOT BUBBLE COLOR */
      border: 1px solid #30364d;
      border-radius: 4px 18px 18px 18px;
      color: #e0e6ed;
    }
    .msg.user .bubble { 
      background: #534ab7; /* USER BUBBLE COLOR */
      border-radius: 18px 4px 18px 18px;
    }
    
    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; margin-top: 4px; flex-shrink: 0; }
    .bot-av { background: #3c3489; color: #fff; }
    .user-av { background: #534ab7; color: #fff; }
    
    .tool-tag { display: inline-block; font-size: 12px; background: #233e36; color: #73f0c2; border-radius: 6px; padding: 4px 10px; margin-top: 8px; font-family: monospace; }
    
    .typing { display: flex; gap: 5px; align-items: center; padding: 6px 0; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #8e95a3; animation: bounce 1.4s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }
    
    #input-area { padding: 16px; border-top: 1px solid #30364d; display: flex; gap: 10px; align-items: flex-end; background: #1a1d26; }
    #user-input { flex: 1; resize: none; border: 1px solid #30364d; border-radius: 14px; padding: 12px 16px; font-size: 14px; font-family: inherit; background: #14161f; color: #fff; max-height: 120px; line-height: 1.5; }
    #user-input:focus { outline: none; border-color: #534ab7; }
    
    #send-btn { width: 42px; height: 42px; border-radius: 50%; background: #534ab7; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
    #send-btn:hover { background: #3c3489; }
    #send-btn svg { width: 20px; height: 20px; fill: white; }
    #send-btn:disabled { background: #2a2d3d; cursor: not-allowed; }
    
    #api-notice { font-size: 11px; color: #8e95a3; text-align: center; padding: 10px; border-top: 1px solid #30364d; background: #14161f; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="avatar">AQ</div>
    <div id="header-text">
      <h2>Academic Quartermaster</h2>
      <p>🛡️ Academics manager  | asia-south1</p>
    </div>
    <div id="status-dot"></div>
  </div>
  <div id="messages">
    <div class="msg bot">
      <div class="msg-avatar bot-av">AQ</div>
      <div class="bubble">Hey user! I'm your Academic Quartermaster. Ask me about your calendar, schedule or notes.</div>
    </div>
  </div>
  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Ask about your calendar, schedule or notes..."></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
  <div id="api-notice">Connected to academics-quartermaster...run.app | API 200 OK</div>
</div>

<script>
// THIS ADDRESS MUST BE CORRECT. NO "/ask" AT THE END.
const API_URL = "https://academics-quartermaster-552903401245.asia-south1.run.app/ask"; 
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");

inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
});

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener("click", sendMessage);

function addMessage(text, role, tools) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  const av = document.createElement("div");
  av.className = "msg-avatar " + (role === "bot" ? "bot-av" : "user-av");
  av.textContent = role === "bot" ? "AQ" : "U";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;
  if (tools && tools.length) {
    tools.forEach(t => {
      const tag = document.createElement("div");
      tag.className = "tool-tag";
      tag.textContent = "🔧 " + t.replace("[Tool called: ","").replace("]","");
      bubble.appendChild(tag);
    });
  }
  div.appendChild(av);
  div.appendChild(bubble);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight; 
}

function showTyping() {
  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = "typing-indicator";
  div.innerHTML = `<div class="msg-avatar bot-av">AQ</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing-indicator");
  if (el) el.remove();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;
  
  inputEl.value = "";
  inputEl.style.height = "auto";
  sendBtn.disabled = true;
  
  addMessage(text, "user");
  showTyping();

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { 
        "Content-Type": "application/json",
        "Accept": "application/json"
      },
      body: JSON.stringify({ prompt: text })
    });

    if (!res.ok) {
      throw new Error(`Server returned ${res.status}`);
    }

    const data = await res.json();
    removeTyping();

    // Check if data exists and has a success status
    if (data && data.status === "success") {
      addMessage(data.agent_response || "Action completed.", "bot", data.tools_used);
    } else {
      // If the backend returned an error status, show the agent's error message if available
      const errMsg = data.agent_response || "Something went wrong. Please try again.";
      addMessage(errMsg, "bot");
    }
  } catch(e) {
    console.error("Fetch Error:", e);
    removeTyping();
    addMessage("Connection Error. Check your internet or Cloud Run logs.", "bot");
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
